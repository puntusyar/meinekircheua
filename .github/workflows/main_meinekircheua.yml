name: Deploy static site to Azure Web App - meinekircheua

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy package
        shell: pwsh
        run: |
          $deployDir = Join-Path $PWD "deploy"
          $zipPath = Join-Path $PWD "site.zip"
          if (Test-Path $deployDir) {
            Remove-Item $deployDir -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Path $deployDir | Out-Null
          Copy-Item "index.html" $deployDir
          Copy-Item "mkua.index.html" $deployDir
          Copy-Item "mkua.styles.css" $deployDir
          Copy-Item "web.config" $deployDir
          Copy-Item "mkua-assets" $deployDir -Recurse
          Compress-Archive -Path "$deployDir\\*" -DestinationPath $zipPath

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B06C220E7893413DB27ADDDE6B9B9330 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7A632F1FBDEE48269AFFD448A3C201A3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1ADCE38DF11D4C42B3B57FADAC7AB4DD }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'meinekircheua'
          slot-name: 'Production'
          package: ./site.zip
